services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: policylens
      POSTGRES_USER: policylens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./policylens/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  pgdata: