# provision_schema.yaml
# PolicyLens — Provision Record Schema
# Decided: Sessions 0–4
# Last updated: Session 4
#
# A provision is a single deontic proposition of the form <subject, modality, object>
# — the minimal unit that assigns exactly one Hohfeldian modality to exactly one subject
# with respect to exactly one object of legal operation.
#
# Session 4 changes:
# - object_ref removed as embedded struct; cross-references are now stored in the
#   provision_references junction table (provision → legal_addresses). See decisions_log.md.
# - Added: context_text, legal_address_id, effective_date, superseded_by (temporal chain),
#   extracted_unit_id (lineage FK to extracted_units table).
# - These fields support RAG embedding, knowledge graph promotion, and point-in-time
#   legislative state queries respectively.

provision:

  # ── Structural fields (always populated at chunking time) ──────────────────

  id:
    type: string
    format: "doc_id:section_id:provision_index"
    description: >
      Unique stable identifier for this provision record.
      Constructed at chunking time and never reassigned.
    required: true

  doc_id:
    type: string
    description: Identifier of the source document in the corpus.
    required: true

  extracted_unit_id:
    type: integer
    description: >
      Foreign key to the extracted_units table. Records which ExtractedUnit(s)
      this provision was normalized from. Provides full lineage from provision
      back to raw source document. Usually 1:1; M:1 when the normalizer merges
      two adjacent extracted units into a single provision.
    required: true

  section_id:
    type: string
    description: >
      Section or subsection reference as it appears in the source document
      (e.g. "Sec. 12(b)(2)" or "§ 1(a)"). Human-readable. Used for display,
      traceability, and construction of deep links to source documents.
      For USLM sources, derived from <enum> elements in the section hierarchy.
      For FR sources, derived from <E T="04"> section markers and sub-paragraph
      text prefixes.
    required: true

  provision_index:
    type: integer
    description: >
      Ordinal position of this provision within its section.
      Zero-indexed. Used to reconstruct reading order.
    required: true

  text:
    type: string
    description: >
      Raw provision text as extracted from the source document.
      No normalization applied. Whitespace preserved.
    required: true

  context_text:
    type: string
    description: >
      Denormalized context-enriched string constructed by the normalizer at
      storage time. Used as the input to vector embedding for semantic search
      (RAG). Combines document title, doc type, section heading, condition_stack
      summary, and provision text into a single interpretable string.
      Example format:
        "[Executive Order 14407 — Sec. 2: Updating the Childhood Vaccine Schedule]
         Text: The CDC and ACIP shall review the scientific assessment..."
      Stored separately from text so raw_text is always the unmodified source.
      Regenerated when section metadata changes; does not change when annotation
      fields change.
    required: true

  section_heading:
    type: string
    description: >
      Heading of the section containing this provision, as extracted from the
      source document. Denormalized onto the provision record for display and
      context_text construction. Nullable for documents without section headings.
    required: false

  doc_type:
    type: string
    enum: [legislation, regulation, agency_guidance, executive_order,
           presidential_proclamation, presidential_memorandum, resolution,
           notice, determination, other]
    description: >
      Type of source document. Extended in Session 4 to distinguish FR
      document subtypes that were previously collapsed into 'other'.
      Used in context_text construction and UX display.
    required: true

  condition_stack:
    type: array
    items:
      type: object
      properties:
        condition_type:
          type: string
          enum: [threshold, existence, temporal, other]
        text:
          type: string
          description: Natural language statement of the condition.
      required: [condition_type, text]
    description: >
      Ordered list of antecedent conditions scoping this provision.
      Empty array if the provision is unconditional.
      Populated at chunking time for nested conditionals.
      Schema decision: structured objects (not plain strings) to allow
      condition-type querying in later analysis phases.
    required: false
    default: []

  chunk_flag:
    type: string
    enum: [clean, review_nested_conditional, review_cross_reference, review_boundary]
    description: >
      Flag set by the chunker when a provision requires human review
      of its boundary. 'clean' means the chunker resolved the boundary
      without ambiguity. All non-clean provisions are included in the
      corpus but surfaced to reviewers in the front-end.
    required: true
    default: clean

  element_type:
    type: string
    enum: [provision_candidate, boilerplate, preamble, header]
    description: >
      Classification assigned by the normalizer during chunking.
      'provision_candidate' — substantive deontic content; proceeds to annotation.
      'boilerplate' — formulaic language (e.g. EO Sec. 3 General Provisions);
        included in corpus, tagged domain:governmental_structure at annotation,
        excluded from ideological clustering but visible in document-reading UX.
      'preamble' — opening formula (e.g. "By the authority vested in me...");
        tagged by extractor, excluded from provision records but retained
        in context_text construction for sibling provisions.
      'header' — section title without deontic content.
      Note: preamble units are not stored as provision records; they are
      retained in extracted_units and referenced for context only.
    required: true
    default: provision_candidate

  # ── Temporal / versioning fields (nullable at Phase 1; load-bearing later) ─

  legal_address_id:
    type: integer
    description: >
      Foreign key to the legal_addresses table. Identifies the legal location
      this provision directly operates on — e.g. a USC citation, CFR section,
      or EO number that this provision amends, enacts, or is codified as.
      Nullable: populated when the legal address is determinable from the
      document structure or citation. Not the same as object_ref (cross-reference
      to an external definition); this is the provision's own legal home.
      Powers Mode C UX (temporal traversal by legal address).
    required: false

  effective_date:
    type: string
    format: date
    description: >
      Date on which this version of the provision became legally operative.
      Nullable: populated when determinable from the source document or
      from the enactment/publication record. For FR documents, typically
      the publication date. For enacted legislation, the effective date
      specified in the bill or the enactment date.
    required: false

  superseded_by:
    type: integer
    description: >
      Foreign key (self-referential) to the provision record that supersedes
      this one. Null if this provision is the current version or if no
      superseding provision has been identified. Together with effective_date,
      forms the version chain for point-in-time queries.
    required: false

  superseded_date:
    type: string
    format: date
    description: >
      Date on which this provision was superseded. Null if current.
      Populated when superseded_by is set.
    required: false

  # ── Normative fields (populated at annotation time) ────────────────────────

  modality:
    type: string
    enum: [duty, permission, power, immunity, complex]
    description: >
      Hohfeldian modality type. Primary set only; four correlatives
      (disability, liability, no_right, right_claim) deferred to second
      annotation pass post-pilot.
    required: false

  object_class:
    type: string
    enum: [conduct, resource, information, status, relation, proceeding]
    description: Preliminary taxonomy of what the provision's object operates on.
    required: false

  # ── Rights/scoring fields (populated at annotation time) ───────────────────

  domain:
    type: string
    enum: [economic, social, civil_procedural, governmental_structure, mixed, pending]
    description: >
      Routes the provision to the correct liberty axis for valence scoring.
      'pending' used when domain cannot be determined without a finalized
      downstream rule or unresolved cross-reference object.
    required: false

  pending_reason:
    type: string
    enum: [awaiting_rulemaking, unresolved_object_ref]
    description: >
      Required when domain = 'pending'. Specifies why tagging is deferred.
      'unresolved_object_ref' now refers to an unresolved row in
      provision_references, not an embedded object_ref field.
    required: false  # required if domain = pending

  pending_monitor:
    type: object
    description: >
      Required when pending_reason = 'awaiting_rulemaking'.
      Enables corpus maintainer to track when re-tagging is triggered.
    properties:
      agency:
        type: string
      docket_id_or_cfr_section:
        type: string
    required: false

  valence:
    type: integer
    minimum: -2
    maximum: 2
    description: >
      Signed ordinal liberty effect score on the routed axis.
      Used when domain is a single axis (economic, social, civil_procedural).
      See controlled_vocabulary.yaml for score definitions and cross-rules.
      Not populated when domain = mixed, governmental_structure, or pending.
    required: false

  valence_economic:
    type: integer
    minimum: -2
    maximum: 2
    description: >
      Economic axis valence score. Populated only when domain = mixed.
    required: false  # required if domain = mixed

  valence_social:
    type: integer
    minimum: -2
    maximum: 2
    description: >
      Social axis valence score. Populated only when domain = mixed.
    required: false  # required if domain = mixed

  subject_type:
    type: string
    enum:
      - individual_natural
      - individual_commercial
      - corporation
      - government_federal
      - government_state
      - government_any
      - mixed
    description: >
      Whose liberty the valence score measures. Score is always taken
      from the perspective of the primary subject identified here.
      Cross-rule A: a duty imposed on government is a liberty expansion
      for the subject class it protects — subject_type in that case is
      the protected class, not the government.
    required: false

  baseline_statement:
    type: string
    description: >
      One-sentence annotator statement of the baseline legal state
      before this provision operates. Required by Cross-rule D.
      Must reference a sub-domain row in baseline_doctrine.yaml by name.
      Populated at annotation time; included in provision record for
      auditability and sample-check review.
    required: false

  # ── Annotation provenance fields ───────────────────────────────────────────

  annotation_method:
    type: string
    enum: [model, human, model_human_reviewed]
    required: false

  annotation_version:
    type: string
    description: >
      Version string of the prompt or rubric used to produce this annotation.
      Allows batch re-annotation when the rubric changes.
    required: false

  sample_check_flag:
    type: boolean
    default: false
    required: false

  sample_check_result:
    type: string
    enum: [confirmed, corrected, escalated]
    required: false

  doctrine_version_date:
    type: string
    format: date
    description: >
      Version date of the baseline_doctrine.yaml table used at annotation time.
    required: false

# ── Cross-reference implementation note ──────────────────────────────────────
#
# object_ref (Sessions 0–3) has been replaced by the provision_references
# junction table. Cross-references are stored as:
#   provision_references(provision_id, legal_address_id, ref_type)
# where ref_type values include: amends | references | implements | supersedes
#
# This makes LegalAddress a first-class entity (legal_addresses table) rather
# than a JSON blob, enabling graph promotion without a schema migration.
# See decisions_log.md — Session 4: Legal Address Architecture.

# ── Constraint notes (enforced at validation layer, not schema layer) ─────────
#
# 1. If domain = mixed:    valence_economic AND valence_social are required;
#                          valence must be absent.
# 2. If domain = pending:  pending_reason is required; valence fields must be absent.
#                          Provision is excluded from clustering runs.
# 3. If domain = governmental_structure:
#                          valence fields must be absent.
#                          Provision is excluded from axis projection.
# 4. Permission modality:  valence must be >= 0  (Cross-rule B)
#    Prohibition/duty:     valence must be <= 0  (Cross-rule B)
# 5. condition_stack depth > 2: chunk_flag must be set to review_nested_conditional.
# 6. element_type = boilerplate or preamble: excluded from clustering and
#    ideological visualization but included in corpus statistics and
#    document-reading UX.
# 7. superseded_by set: superseded_date must also be set.
# 8. effective_date and superseded_date must satisfy: effective_date <= superseded_date.